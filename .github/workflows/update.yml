name: PrihVPN Full List Update

on:
  schedule:
    - cron: '0 * * * *' # Авто-запуск каждый час
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and Filter Configs
        run: |
          # 1. Принудительно очищаем старый файл и временный дамп
          > vpn.json
          > raw.txt

          # 2. Скачиваем сервера только из источника mifa
          curl -sLf "https://mifa.world/fast" >> raw.txt

          # 3. Генерируем заголовок для vpn.json
          echo "#profile-update-interval: 1" > vpn.json
          echo "#profile-title: PrihVPN⚡" >> vpn.json
          echo "#announce: Все обновы в тг PrihsVPN!" >> vpn.json
          echo "" >> vpn.json

          # 4. Фильтруем протоколы и убираем пустышки с 0.0.0.0
          # Сервера дописываются один в один в том же порядке, как на сайте
          grep -E -i "^(vless|trojan|ss|hysteria2)://" raw.txt | grep -v "0.0.0.0" >> vpn.json || true
          
          # Чистим временный мусор
          rm raw.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Индексируем только один файл vpn.json
          git add vpn.json
          
          # Пушим обновления с фиксацией времени
          git commit -m "Force Update (Mifa Only): $(date +'%H:%M:%S')" || echo "No changes to commit"
          git push origin main || git push --force
