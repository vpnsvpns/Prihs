name: Update Mifa Fast

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Process
        run: |
          # Скачиваем файл во временный
          curl -sLf "https://mifa.world/fast" -o raw.txt

          # Создаем заголовок
          echo "#profile-update-interval: 1" > vpn.json
          echo "#profile-title: PrihVPN⚡" >> vpn.json
          echo "#announce: Все обновы в тг PrihsVPN!" >> vpn.json
          echo "" >> vpn.json

          # Вытаскиваем все протоколы без жесткой привязки к началу строки и убираем пустышки 0.0.0.0
          tr -d '\r' < raw.txt | grep -E -i "(vless|trojan|ss|hysteria2)://" | grep -v "0.0.0.0" >> vpn.json || true

          # Удаляем временный файл
          rm -f raw.txt

      - name: Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add vpn.json
          git commit -m "Update: $(date +'%H:%M:%S')" || echo "No changes"
          git push origin main || git push --force
