name: PrihVPN Full List Update

on:
  schedule:
    - cron: '0 * * * *' # Авто-запуск каждый час
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and Filter Configs
        run: |
          # 1. Принудительно очищаем целевые и временные файлы перед записью
          > vpn.json
          > white.json
          > raw.txt
          > raw_white.txt

          # 2. Скачиваем источники в свои временные файлы
          curl -sLf "https://vpn.akres.fun/all" >> raw.txt
          curl -sLf "https://vpn.akres.fun/bwl" >> raw_white.txt

          # 3. Генерируем заголовок ТОЛЬКО для vpn.json
          echo "#profile-update-interval: 1" > vpn.json
          echo "#profile-title: PrihVPN⚡" >> vpn.json
          echo "#announce: Все обновы в тг PrihsVPN!" >> vpn.json
          echo "" >> vpn.json

          # 4. Фильтруем протоколы и убираем пустышки с 0.0.0.0
          # Для vpn.json
          grep -E -i "^(vless|trojan|ss|hysteria2)://" raw.txt | grep -v "0.0.0.0" > filtered_links.txt || true
          cat filtered_links.txt >> vpn.json
          
          # Для white.json (чистый список, без шапки)
          grep -E -i "^(vless|trojan|ss|hysteria2)://" raw_white.txt | grep -v "0.0.0.0" >> white.json || true
          
          # Чистим временный мусор
          rm -f raw.txt raw_white.txt filtered_links.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Индексируем оба получившихся файла
          git add vpn.json white.json
          
          # Коммит с точным временем
          git commit -m "Force Update (All & BWL): $(date +'%H:%M:%S')" || echo "No changes to commit"
          git push origin main || git push --force
