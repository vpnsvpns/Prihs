name: PrihVPN New File Flow

on:
  schedule:
    - cron: '0 * * * *' # Авто-запуск каждый час
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Права на запись, чтобы пушить файлы назад
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and Process File
        run: |
          # 1. Создаем и принудительно очищаем нужные файлы перед работой
          touch new_config.json temp_raw.txt
          echo -n "" > new_config.json
          echo -n "" > temp_raw.txt

          # 2. Скачиваем нужный источник (впиши свою ссылку вместо URL)
          curl -sLf "ВСТАВЬ_СЮДА_ССЫЛКУ" >> temp_raw.txt || touch temp_raw.txt

          # 3. Генерируем фирменную шапку
          echo "#profile-update-interval: 1" > new_config.json
          echo "#profile-title: PrihVPN⚡ New Config" >> new_config.json
          echo "#announce: Все обновы в тг PrihsVPN! [Обновлено: $(date +'%H:%M:%S')]" >> new_config.json
          echo "" >> new_config.json

          # 4. Фильтруем протоколы (если это обычный текст)
          if [ -s temp_raw.txt ]; then
            grep -E -i "^(vless|trojan|ss|hysteria2)://" temp_raw.txt | grep -v "0.0.0.0" >> new_config.json || true
          fi
          
          # Если источник в Base64 — используй строку ниже (раскомментируй её, убрав решетку, а grep выше удали):
          # base64 -d -i < temp_raw.txt 2>/dev/null | tr -d '\r' | awk -v RS='(vless|trojan|ss|hysteria2)://' 'NR>1 {print proto $0} {proto=RT}' | grep -v "0.0.0.0" >> new_config.json || true

          # 5. Чистим за собой временный мусор
          rm -f temp_raw.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Индексируем твой новый файл
          git add new_config.json
          
          # Пушим изменения
          git commit -m "New File Auto Update: $(date +'%H:%M:%S')" || echo "No changes to commit"
          git push origin main || git push --force
