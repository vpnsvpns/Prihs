name: PrihVPN Hysteria Update

on:
  schedule:
    - cron: '0 * * * *' # Авто-запуск каждый час
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Права на запись в репозиторий
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Hysteria Configs
        run: |
          # 1. Безопасно создаем и очищаем файлы перед работой
          touch hysteria.json temp_hysteria.txt
          echo -n "" > hysteria.json
          echo -n "" > temp_hysteria.txt

          # 2. Скачиваем с mifa.world, маскируясь под Chrome, чтобы обойти блок Cloudflare
          curl -sL -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
               "https://mifa.world/hysteria" -o temp_hysteria.txt || touch temp_hysteria.txt

          # 3. Генерируем фирменную шапку подписки
          echo "#profile-update-interval: 1" > hysteria.json
          echo "#profile-title: PrihVPN⚡ Hysteria" >> hysteria.json
          echo "#announce: Все обновы в тг PrihsVPN!" >> hysteria.json
          echo "" >> hysteria.json

          # 4. Расшифровываем Base64, чистим переносы строк, фильтруем только hysteria2 и убираем 0.0.0.0
          if [ -s temp_hysteria.txt ]; then
            base64 -d < temp_hysteria.txt | tr -d '\r' | grep -E -i "hysteria2://" | grep -v "0.0.0.0" >> hysteria.json || true
          fi
          
          # Чистим временный мусор
          rm -f temp_hysteria.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Индексируем hysteria.json
          git add hysteria.json
          
          # Пушим изменения с фиксацией времени
          git commit -m "Hysteria Base64 Parsed Update: $(date +'%H:%M:%S')" || echo "No changes to commit"
          git push origin main || git push --force