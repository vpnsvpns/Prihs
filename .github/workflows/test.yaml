name: PrihVPN Mifa and Ros Update

on:
  schedule:
    - cron: '0 * * * *' # Авто-запуск каждый час
  workflow_dispatch:      # Кнопка для ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Права на запись в репозиторий
      
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch and Parse Configs
        run: |
          # 1. Безопасно создаем и очищаем все файлы перед работой
          touch ros.json mifa.json temp_ros.txt temp_mifa.txt
          echo -n "" > ros.json
          echo -n "" > mifa.json
          echo -n "" > temp_ros.txt
          echo -n "" > temp_mifa.txt

          # 2. Скачиваем источники (mifa с маскировкой, ros обычным curl)
          curl -sL "https://subrostunnel.vercel.app/gen.txt" -o temp_ros.txt || touch temp_ros.txt

          curl -sL -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8" \
               "https://mifa.world/fast" -o temp_mifa.txt || touch temp_mifa.txt

          # 3. Генерируем фирменные шапки
          # Для Ros списка
          echo "#profile-update-interval: 1" > ros.json
          echo "#profile-title: PrihVPN⚡ Ros" >> ros.json
          echo "#announce: Все обновы в тг PrihsVPN!" >> ros.json
          echo "" >> ros.json

          # Для Mifa (Общий список)
          echo "#profile-update-interval: 1" > mifa.json
          echo "#profile-title: PrihVPN⚡ Mifa Full" >> mifa.json
          echo "#announce: Все обновы в тг PrihsVPN!" >> mifa.json
          echo "" >> mifa.json

          # 4. Расшифровываем Base64 без потерь первого сервера
          # sed добавляет перенос строки перед каждым протоколом, чтобы они не слипались, а grep -i забирает всё
          if [ -s temp_ros.txt ]; then
            base64 -d -i < temp_ros.txt 2>/dev/null | tr -d '\r' | sed -E 's/(vless|trojan|ss|hysteria2):\/\//\n\1:\/\//g' | grep -E -i "(vless|trojan|ss|hysteria2)://" | grep -v "0.0.0.0" >> ros.json || true
          fi

          if [ -s temp_mifa.txt ]; then
            base64 -d -i < temp_mifa.txt 2>/dev/null | tr -d '\r' | sed -E 's/(vless|trojan|ss|hysteria2):\/\//\n\1:\/\//g' | grep -E -i "(vless|trojan|ss|hysteria2)://" | grep -v "0.0.0.0" >> mifa.json || true
          fi
          
          # Чистим временный мусор
          rm -f temp_ros.txt temp_mifa.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Индексируем получившиеся файлы ros.json и mifa.json
          git add ros.json mifa.json
          
          # Пушим изменения в репозиторий
          git commit -m "Mifa & Ros Perfect Parse: $(date +'%H:%M:%S')" || echo "No changes to commit"
          git push origin main || git push --force
